# ============================================
# MongoDB Configuration (MongoDB Compass)
# ============================================
spring.data.mongodb.uri=mongodb://localhost:27017/traffic_fines_db
spring.data.mongodb.database=traffic_fines_db

# ============================================
# Server Configuration
# ============================================
server.port=8080

# ============================================
# JWT Configuration
# ============================================
# IMPORTANT: Change this secret key in production (must be Base64-encoded, min 256 bits)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ============================================
# CORS Configuration
# ============================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173,http://localhost:8080

# ============================================
# SMS Configuration (Twilio)
# Fill these with your actual Twilio credentials
# ============================================
twilio.account-sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth-token=YOUR_TWILIO_AUTH_TOKEN
twilio.phone-number=+1XXXXXXXXXX
twilio.enabled=false

# ============================================
# Logging
# ============================================
logging.level.traffic.example=DEBUG
logging.level.org.springframework.security=INFO